<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <style>

        body{
            font-family:Arial;
            margin:0;
            background:#f5f5f5;
        }

        .header{
            background:#6200ee;
            color:white;
            padding:20px;
            font-size:24px;
        }

        .card{
            background:white;
            margin:15px;
            padding:15px;
            border-radius:16px;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }

        img{
            width:100%;
            border-radius:12px;
        }

        .title{
            font-size:20px;
            margin-top:10px;
            font-weight:bold;
        }

        .subtitle{
            color:gray;
            margin-bottom:10px;
        }

        button{
            border:none;
            padding:12px;
            border-radius:12px;
            color:white;
            margin-right:10px;
            cursor:pointer;
        }

        .edit{
            background:#03a9f4;
        }

        .delete{
            background:#f44336;
        }

        .fab{
            position:fixed;
            bottom:20px;
            right:20px;
            width:60px;
            height:60px;
            border-radius:50%;
            background:#6200ee;
            color:white;
            font-size:30px;
        }

        .form{
            display:none;
            padding:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:12px;
            border:1px solid #ccc;
        }

    </style>
</head>

<body>

<div class="header">
    CRUD WebView
</div>

<div id="listScreen">

    <div class="card">

        <img src="https://picsum.photos/400/200">

        <div class="title">
            Producto 1
        </div>

        <div class="subtitle">
            Descripción del producto
        </div>

        <button class="edit" onclick="openForm()">
            Editar
        </button>

        <button class="delete" onclick="deleteItem()">
            Eliminar
        </button>

    </div>

</div>

<div class="form" id="formScreen">

    <h2>Formulario</h2>

    <input type="text" placeholder="Nombre">

    <input type="date">

    <label>
        Activo
    </label>

    <input type="checkbox">

    <button class="edit" onclick="backToList()">
        Guardar
    </button>

</div>

<button class="fab" onclick="openForm()">
    +
</button>

<script>

    function openForm(){

        document.getElementById("listScreen").style.display = "none";

        document.getElementById("formScreen").style.display = "block";
    }

    function backToList(){

        document.getElementById("listScreen").style.display = "block";

        document.getElementById("formScreen").style.display = "none";

        Android.showToast("Guardado correctamente");
    }

    function deleteItem(){

        Android.showDeleteDialog();
    }

</script>

</body>
</html>
